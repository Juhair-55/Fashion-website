<!DOCTYPE html>
<!-- Feedback Page - Form for visitor feedback -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - AccessoryHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header Section -->
<header>
    <a href="index.html" class="logo">Accessory<span>Hub</span></a>
    <div class="search-bar">
        <input type="text" placeholder="Search accessories...">
        <button>Search</button>
    </div>
    <div class="header-buttons">
        <a href="#">Sign Up</a>
        <a href="#">Log In</a>
    </div>
</header>

<!-- Navigation Menu Section -->
<nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="glasses.html">Glasses</a></li>
        <li><a href="watches.html">Watches</a></li>
        <li><a href="bags.html">Bags</a></li>
        <li><a href="jewelry.html">Jewelry</a></li>
        <li><a href="feedback.html" class="active">Feedback</a></li>
    </ul>
</nav>

<!-- Primary Content Section -->
<article>
    <h1>We Value Your Feedback</h1>
    <p>Please take a moment to share your experience with AccessoryHub. Your feedback helps us improve!</p>

    <div class="form-container">
        <form action="#" method="post">
            <!-- Personal Information Fieldset -->
            <fieldset>
                <legend>Personal Information</legend>
                <table class="form-table">
                    <tr>
                        <td><label for="fullname">Full Name:</label></td>
                        <td><input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required></td>
                    </tr>
                    <tr>
                        <td><label for="email">Email Address:</label></td>
                        <td><input type="email" id="email" name="email" placeholder="Enter your email" required></td>
                    </tr>
                    <tr>
                        <td><label for="phone">Phone Number:</label></td>
                        <td><input type="tel" id="phone" name="phone" placeholder="e.g. +60 12-345 6789"></td>
                    </tr>
                    <tr>
                        <td><label for="dob">Date of Visit:</label></td>
                        <td><input type="date" id="dob" name="visit_date"></td>
                    </tr>
                </table>
            </fieldset>

            <!-- Feedback Details Fieldset -->
            <fieldset>
                <legend>Your Feedback</legend>
                <table class="form-table">
                    <tr>
                        <td><label>How did you find us?</label></td>
                        <td>
                            <input type="radio" id="social" name="source" value="social">
                            <label for="social" style="display:inline;">Social Media</label><br>
                            <input type="radio" id="search" name="source" value="search">
                            <label for="search" style="display:inline;">Search Engine</label><br>
                            <input type="radio" id="friend" name="source" value="friend">
                            <label for="friend" style="display:inline;">Friend Referral</label>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="rating">Overall Rating:</label></td>
                        <td>
                            <select id="rating" name="rating">
                                <option value="">-- Select Rating --</option>
                                <option value="5">Excellent (5 Stars)</option>
                                <option value="4">Good (4 Stars)</option>
                                <option value="3">Average (3 Stars)</option>
                                <option value="2">Below Average (2 Stars)</option>
                                <option value="1">Poor (1 Star)</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label>What did you like?</label></td>
                        <td>
                            <input type="checkbox" id="design" name="liked" value="design">
                            <label for="design" style="display:inline;">Website Design</label><br>
                            <input type="checkbox" id="products" name="liked" value="products">
                            <label for="products" style="display:inline;">Product Range</label><br>
                            <input type="checkbox" id="pricing" name="liked" value="pricing">
                            <label for="pricing" style="display:inline;">Pricing</label><br>
                            <input type="checkbox" id="navigation" name="liked" value="navigation">
                            <label for="navigation" style="display:inline;">Easy Navigation</label>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="comments">Comments:</label></td>
                        <td><textarea id="comments" name="comments" placeholder="Share your thoughts with us..."></textarea></td>
                    </tr>
                </table>
            </fieldset>

            <button type="submit" class="submit-btn">Submit Feedback</button>
        </form>
    </div>
</article>

<!-- Footer Section -->
<footer>
    <p>&copy; <a href="about.html">Group Number</a> | Last updated: May 2026</p>
</footer>

<!-- JavaScript form validation (Advanced Feature) -->
<script>
/* Form validation script to enhance user experience */
document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    var name = document.getElementById('fullname').value;
    var email = document.getElementById('email').value;
    if (name && email) {
        alert('Thank you for your feedback, ' + name + '! We appreciate your input.');
        this.reset();
    } else {
        alert('Please fill in all required fields.');
    }
});
</script>

</body>
</html>
